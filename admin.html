<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel Admin</title>
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; padding:20px; max-width:1200px; margin:0 auto; }
    table { width:100%; border-collapse: collapse; margin-top:15px; }
    th, td { padding:10px; border:1px solid #334155; text-align:left; }
    th { background:#1e2937; }
    button { padding:6px 12px; margin:3px; border:none; border-radius:5px; cursor:pointer; }
    .delete-btn { background:#ef4444; color:white; }
    .block-btn { background:#f59e0b; color:white; }
    .unblock-btn { background:#22c55e; color:white; }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel Admin Panel</h1>

  <!-- Password Login -->
  <div id="password-section">
    <input type="password" id="admin-password" placeholder="Admin Password" style="padding:10px; width:250px;">
    <button onclick="loginAsAdmin()" style="padding:10px 20px;">Login</button>
  </div>

  <!-- Admin Content -->
  <div id="admin-content" style="display:none;">
    <button onclick="loadUsers()" style="margin-bottom:20px;">🔄 Refresh List</button>

    <h2>Pending Registrations</h2>
    <table id="pending-table">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Phone</th><th>Action</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2 style="margin-top:50px;">Approved Users</h2>
    <table id="approved-table">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let adminPassword = localStorage.getItem("adminPassword") || "";

    async function loginAsAdmin() {
      const pw = document.getElementById("admin-password").value.trim();
      if (!pw) return alert("Please enter password");

      const res = await fetch(`https://ozintel-backend.onrender.com/admin/users?password=${encodeURIComponent(pw)}`);
      if (res.ok) {
        localStorage.setItem("adminPassword", pw);
        adminPassword = pw;
        document.getElementById("password-section").style.display = "none";
        document.getElementById("admin-content").style.display = "block";
        loadUsers();
      } else {
        alert("Incorrect password");
      }
    }

    async function loadUsers() {
      const res = await fetch(`https://ozintel-backend.onrender.com/admin/users?password=${encodeURIComponent(adminPassword)}`);
      if (!res.ok) {
        alert("Session expired. Please login again.");
        localStorage.removeItem("adminPassword");
        location.reload();
        return;
      }

      const allUsers = await res.json();

      // Pending Users
      const pendingBody = document.querySelector("#pending-table tbody");
      pendingBody.innerHTML = "";
      allUsers.filter(u => u.status === "pending").forEach(user => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.phone || "-"}</td>
          <td><button onclick="approveUser(${user.id})">Approve</button></td>
        `;
        pendingBody.appendChild(row);
      });

      // Approved Users
      const approvedBody = document.querySelector("#approved-table tbody");
      approvedBody.innerHTML = "";
      allUsers.filter(u => u.status === "approved").forEach(user => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td style="color: ${user.blocked ? '#ef4444' : '#22c55e'}; font-weight:bold;">
            ${user.blocked ? "Blocked" : "Active"}
          </td>
          <td>
            <button class="delete-btn" onclick="deleteUser(${user.id})">🗑️</button>
            <button class="${user.blocked ? 'unblock-btn' : 'block-btn'}" 
                    onclick="${user.blocked ? 'unblockUser' : 'blockUser'}('${user.email}')">
              ${user.blocked ? "Unblock" : "Block"}
            </button>
          </td>
        `;
        approvedBody.appendChild(row);
      });
    }

    async function approveUser(id) {
      await fetch("https://ozintel-backend.onrender.com/admin/approve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, password: adminPassword })
      });
      loadUsers();
    }

    async function deleteUser(id) {
      if (!confirm("Delete this user permanently?")) return;
      await fetch("https://ozintel-backend.onrender.com/admin/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, password: adminPassword })
      });
      loadUsers();
    }

    async function blockUser(email) {
      await fetch("https://ozintel-backend.onrender.com/admin/block", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: adminPassword })
      });
      loadUsers();
    }

    async function unblockUser(email) {
      await fetch("https://ozintel-backend.onrender.com/admin/unblock", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: adminPassword })
      });
      loadUsers();
    }

    // Auto-login if password is saved
    if (adminPassword) {
      document.getElementById("password-section").style.display = "none";
      document.getElementById("admin-content").style.display = "block";
      loadUsers();
    }
  </script>
</body>
</html>
