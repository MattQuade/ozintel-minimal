<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel - Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
    h1 { text-align: center; color: #1a3c5e; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #1a3c5e; color: white; }
    button { padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; }
    .approve { background: #28a745; color: white; }
    .block { background: #dc3545; color: white; }
    .delete { background: #6c757d; color: white; }
    .select { padding: 6px; }
  </style>
</head>
<body>

  <h1>Admin Panel - User Management</h1>
  <p style="text-align:center;">Only visible to authorized admins</p>

  <table id="userTable">
    <thead>
      <tr>
        <th>Email</th>
        <th>Status</th>
        <th>Permissions</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>

  <script>
    // TODO: Connect to your real backend / data source here
    let users = [
      { email: "you@yourdomain.com", status: "approved", permissions: ["accounting", "pub", "forestry"] },
      // Add more users as they register
    ];

    function renderUsers() {
      const tbody = document.getElementById('userList');
      tbody.innerHTML = '';
      users.forEach((user, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.email}</td>
          <td>${user.status}</td>
          <td>${user.permissions.join(', ')}</td>
          <td>
            <button class="approve" onclick="approveUser(${index})">Approve</button>
            <button class="block" onclick="blockUser(${index})">Block</button>
            <button class="delete" onclick="deleteUser(${index})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Placeholder functions - connect to your real logic
    function approveUser(i) { alert("User approved (connect to backend)"); }
    function blockUser(i) { alert("User blocked (connect to backend)"); }
    function deleteUser(i) { alert("User deleted (connect to backend)"); }

    renderUsers();
  </script>
</body>
</html>
