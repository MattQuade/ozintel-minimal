<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; text-align:center; padding:20px; }
    h1 { color:#22d3ee; }
    button { padding:20px; font-size:1.3rem; margin:15px; border:none; border-radius:12px; width:90%; max-width:400px; }
    .safe { background:#22c55e; }
    .emergency { background:#ef4444; }
    .status { margin:20px; font-size:1.1rem; min-height:40px; }
    input { padding:12px; margin:8px 4px; font-size:1rem; border-radius:8px; }
    .section { margin:30px 0; border-top:1px solid #334155; padding-top:20px; }
    #new-safe-phone, #new-safe-name { width: 38% !important; }
    #new-emergency-phone, #new-emergency-name { width: 38% !important; }
    .small-btn { padding:10px 20px; font-size:1rem; }
    .contact-item { background:#334155; padding:12px; margin:10px auto; border-radius:8px; max-width:400px; text-align:left; }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel</h1>
  <p>Personal Safety Alert System</p>

  <button onclick="showSignUpPage()" style="background:#64748b; padding:12px 30px; font-size:1rem;">👤 admin@ozintel</button>

  <button class="safe" onclick="sendSafeAlert()">✅ SAFE ARRIVAL</button>
  <button class="emergency" onclick="sendEmergencyAlert()">🚨 SEND HELP</button>

  <div class="section">
    <h2>Safe Arrival Contacts</h2>
    <div id="safe-contacts-list"></div>
    <input type="tel" id="new-safe-phone" placeholder="+61412345678">
    <input type="text" id="new-safe-name" placeholder="Name">
    <button onclick="addSafeContact()" class="small-btn">Add Safe</button>
  </div>

  <div class="section">
    <h2>Emergency Contacts</h2>
    <div id="emergency-contacts-list"></div>
    <input type="tel" id="new-emergency-phone" placeholder="+61412345678">
    <input type="text" id="new-emergency-name" placeholder="Name">
    <button onclick="addEmergencyContact()" class="small-btn">Add Emergency</button>
  </div>

  <p id="status" class="status"></p>

  <script src="script.js"></script>
</body>
</html>
