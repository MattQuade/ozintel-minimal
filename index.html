<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel - Personal Safety</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🛡️ OzIntel</h1>
    <p class="subtitle">Personal Safety Alert System</p>

    <div id="auth-screen">
      <h2>Create Account</h2>
      <input type="text" id="first-name" placeholder="First Name" required>
      <input type="text" id="last-name" placeholder="Last Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="tel" id="phone" placeholder="Phone Number (+614...)" >

      <button onclick="signUp()">Sign Up with Magic Link</button>
      <p id="status" class="status"></p>
      <p class="small">We'll send you a magic link to log in instantly. No password needed.</p>
    </div>

    <div id="main-app" style="display: none;">
      <!-- Main alert page will load here after login -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
