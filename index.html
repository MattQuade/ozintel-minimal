<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel - Alert System</title>
  <script src="script.js" defer></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; min-height: 100vh; }
    h1 { color: #22d3ee; text-align: center; }
    button { padding: 18px 24px; font-size: 1.35rem; border: none; border-radius: 12px; cursor: pointer; margin: 12px auto; display: block; width: 90%; max-width: 420px; }
    .safe-btn { background: #22c55e; color: white; }
    .help-btn { background: #ef4444; color: white; }
    .nav-btn { background: #0ea5e9; color: white; padding: 14px 28px; font-size: 1.1rem; margin: 10px auto; display: block; width: 90%; max-width: 420px; }
    .ops-btn { background: #8b5cf6; }
    .status { min-height: 60px; text-align: center; font-size: 1.2rem; margin: 20px 0; color: #22c55e; }
    .container { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ OzIntel</h1>
    <p style="text-align:center; margin-bottom:30px;">Alert System</p>

    <button class="safe-btn" onclick="sendSafeArrival()">✅ SAFE ARRIVAL</button>
    <button class="help-btn" onclick="sendEmergencyAlert()">🚨 SEND HELP</button>

    <p class="status" id="status"></p>

    <div id="contactsContainer" style="margin-top:40px;"></div>

    <div style="margin-top:60px; text-align:center;">
      <button class="nav-btn" onclick="goToAccounting()">📊 Accounting - Pending Approval</button>
      <button class="nav-btn ops-btn" onclick="goToOps()">⚙️ Ops (Operations)</button>
    </div>
  </div>
</body>
</html>
