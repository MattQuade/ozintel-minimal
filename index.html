<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel</title>
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; text-align:center; padding:20px; }
    h1 { color:#22d3ee; }
    button { padding:15px; font-size:1.1rem; margin:10px; border:none; border-radius:10px; width:85%; max-width:380px; }
    .safe { background:#22c55e; }
    .emergency { background:#ef4444; }
    .status { margin:20px; font-size:1.1rem; min-height:40px; }
    input { padding:10px; margin:6px 4px; font-size:1rem; border-radius:6px; }
    
    /* Width reductions */
    #new-phone, #new-name { width: 42%; }   /* 30% reduction + alignment */
    .small-btn { padding:8px 16px; font-size:0.95rem; }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel</h1>
  <p>Personal Safety Alert System</p>

  <button onclick="showSignUpPage()" style="background:#64748b; padding:12px 30px; font-size:1rem;">👤 admin@ozintel</button>

  <div style="margin:25px 0;">
    <input type="tel" id="new-phone" placeholder="+61412345678">
    <input type="text" id="new-name" placeholder="Contact Name">
    <button onclick="addContact()" class="small-btn">Add</button>
  </div>

  <div id="contacts-list"></div>

  <button class="safe" onclick="sendSafeAlert()">✅ SAFE ARRIVAL</button>
  <button class="emergency" onclick="sendEmergencyAlert()">🚨 SEND HELP</button>

  <p id="status" class="status"></p>

  <script src="script.js"></script>
</body>
</html>
