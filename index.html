<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel - Personal Safety</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🛡️ OzIntel</h1>
    <p class="subtitle">Personal Safety Alert System</p>

    <div id="auth-screen">
      <h2>Sign Up</h2>
      <input type="text" id="first-name" placeholder="First Name" style="width:100%;padding:10px;margin:5px 0;">
      <input type="text" id="last-name" placeholder="Last Name" style="width:100%;padding:10px;margin:5px 0;">
      <input type="email" id="email" placeholder="Email Address" style="width:100%;padding:10px;margin:5px 0;">
      <input type="tel" id="phone" placeholder="Phone Number" style="width:100%;padding:10px;margin:5px 0;">

      <button onclick="signUp()" style="width:100%;padding:15px;margin-top:10px;font-size:1.1rem;">Send Magic Link</button>
      <p id="status" class="status"></p>
    </div>

    <div id="main-app" style="display:none;">
      <h2>Welcome</h2>
      <p id="user-name"></p>
      <!-- We'll expand this later -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
