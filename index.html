<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OzIntel Alert System</title>
    <link rel="manifest" href="manifest.json">
    <script defer src="script.js"></script>
    <style>
        body {
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
        }
        .contact-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .contact-item input {
            flex: 1;
            padding: 8px;
        }
        .remove-btn {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }
        .add-btn {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        .safe-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            width: 150px;
            font-size: 16px;
            cursor: pointer;
        }
        .emergency-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            width: 150px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header style="text-align:center; margin-top:20px;">
        <img src="icon-512.png" alt="OzIntel Logo" style="width:80px; height:80px;">
        <h1 style="margin:10px 0 0 0; font-size:32px;">OzIntel</h1>
        <h2 style="margin:0; font-size:18px;">Alert System</h2>
    </header>

    <main style="padding:20px;">

        <!-- SAFE CONTACTS -->
        <section>
            <h3>Safe Arrival Contacts</h3>
            <div id="safeContacts"></div>
            <button id="addSafeContactBtn" class="add-btn">Add Safe Contact</button>
        </section>

        <hr style="margin:25px 0; opacity:0.3;">

        <!-- EMERGENCY CONTACTS -->
        <section>
            <h3>Emergency Contacts</h3>
            <div id="emergencyContacts"></div>
            <button id="addEmergencyContactBtn" class="add-btn">Add Emergency Contact</button>
        </section>

        <hr style="margin:25px 0; opacity:0.3;">

        <!-- ACTION BUTTONS -->
        <div style="display:flex; gap:20px; justify-content:center; margin-top:30px;">
            <button id="safeAlertBtn" class="safe-btn">✔ SAFE ARRIVAL</button>
            <button id="emergencyAlertBtn" class="emergency-btn">🚨 SEND HELP</button>
        </div>

    </main>

</body>
</html>
