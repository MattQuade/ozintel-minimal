<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22d3ee">
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icon-512.png">
  
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; text-align:center; padding:20px; }
    h1 { color:#22d3ee; }
    button { padding:20px; font-size:1.3rem; margin:15px; border:none; border-radius:12px; width:90%; max-width:400px; cursor: pointer; }
    .safe { background:#22c55e; color: white; }
    .emergency { background:#ef4444; color: white; }
    .accounting { background:#3b82f6; color:white; }
    .register-btn { background:#64748b; padding:12px 30px; font-size:1rem; width:auto; max-width:300px; color: white; }
    .small-btn { padding: 12px 20px; font-size: 1rem; width: auto; background: #0ea5e9; color: white; }
    .section { margin:30px 0; border-top:1px solid #334155; padding-top:20px; }
    .contact-item { background:#334155; padding:12px; margin:10px auto; border-radius:8px; max-width:400px; text-align:left; display: flex; justify-content: space-between; align-items: center; }
    .contact-item button { background: #dc3545; color: white; padding: 6px 12px; font-size: 0.9rem; width: auto; margin: 0; }
    .sms-counter {
      background: #1e2937;
      padding: 12px 20px;
      border-radius: 10px;
      margin: 15px auto;
      max-width: 300px;
      font-size: 1.1rem;
      color: #cbd5e1;
    }
    .sms-counter strong { color: #22c55e; font-size: 1.3rem; }
    .activation-box { background:#1e2937; padding:20px; border-radius:12px; margin:20px auto; max-width:400px; }
    .status { margin:20px; font-size:1.1rem; min-height:40px; color:#22c55e; }

    input, textarea {
      width: 90%;
      max-width: 400px;
      padding: 16px 14px;
      margin: 12px 0;
      font-size: 1.25rem;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #1e2937;
      color: white;
      box-sizing: border-box;
    }
    .add-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    @media (min-width: 600px) {
      .add-row { flex-direction: row; justify-content: center; gap: 12px; }
      .add-row input { width: auto; flex: 1; max-width: 180px; }
    }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel</h1>
  <p>Alert System</p>

  <!-- Activation Section -->
  <div id="activation-section" class="activation-box" style="display:none;">
    <h3>Activate Your Profile</h3>
    <p>Enter the email you used to register.</p>
    <input type="email" id="activate-email" placeholder="Your registered email">
    <button onclick="activateProfile()" class="small-btn">Activate Profile</button>
  </div>

  <!-- Big Alert Buttons -->
  <button class="safe" onclick="sendSafeArrival()">✅ SAFE ARRIVAL</button>
  <button class="emergency" onclick="sendEmergencyAlert()">🚨 SEND HELP</button>

  <!-- Sign Up -->
  <button onclick="window.location.href='signup.html'" class="register-btn">
    Sign Up
  </button>

  <!-- Status -->
  <p id="status" class="status"></p>

  <!-- SMS Counter -->
  <div class="sms-counter" id="sms-counter">
    SMS Sent this month: <strong id="sms-count">0</strong>
  </div>

  <!-- Safe Arrival Contacts -->
  <div class="section">
    <h2>Safe Arrival Contacts</h2>
    <div id="safeContactsList"></div>
    <div class="add-row">
      <input type="tel" id="safeContactPhone" placeholder="+61412345678">
      <input type="text" id="safeContactName" placeholder="Name">
      <button onclick="addSafeContact()" class="small-btn">Add Safe</button>
    </div>
  </div>

  <!-- Emergency Contacts -->
  <div class="section">
    <h2>Emergency Contacts</h2>
    <div id="emergencyContactsList"></div>
    <div class="add-row">
      <input type="tel" id="emergencyContactPhone" placeholder="+61412345678">
      <input type="text" id="emergencyContactName" placeholder="Name">
      <button onclick="addEmergencyContact()" class="small-btn">Add Emergency</button>
    </div>
  </div>

  <!-- Accounting -->
  <button onclick="handleAccountingClick()" class="accounting" id="accounting-btn">
    📊 Accounting <span id="accounting-status">(Pending Approval)</span>
  </button>

  <button onclick="window.location.href='ops.html'" style="background:#f97316; color:white;">
    Ops
  </button>

  <script src="script.js?v=20260722"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
