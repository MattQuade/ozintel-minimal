<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel</title>
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; text-align:center; padding:20px; }
    button { padding:20px; font-size:1.4rem; margin:10px; border:none; border-radius:12px; width:90%; max-width:400px; }
    .safe { background:#22c55e; }
    .emergency { background:#ef4444; }
    .status { margin:20px; font-size:1.2rem; min-height:40px; }
    input { padding:12px; margin:5px; width:65%; font-size:1rem; }
    .contact-item { background:#334155; padding:12px; margin:8px auto; border-radius:8px; max-width:400px; text-align:left; }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel</h1>
  <p>Personal Safety Alert System</p>

  <div style="margin:20px 0;">
    <input type="tel" id="new-phone" placeholder="+61412345678">
    <input type="text" id="new-name" placeholder="Contact Name">
    <button onclick="addContact()">Add Contact</button>
  </div>

  <div id="contacts-list"></div>

  <button class="safe" onclick="sendSafeAlert()">✅ SAFE ARRIVAL</button>
  <button class="emergency" onclick="sendEmergencyAlert()">🚨 SEND HELP</button>

  <p id="status" class="status"></p>

  <script src="script.js"></script>
</body>
</html>
