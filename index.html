<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzIntel</title>
  <style>
    body { font-family: system-ui; background:#0f172a; color:white; text-align:center; padding:20px; }
    button { padding:25px; font-size:1.5rem; margin:15px; border:none; border-radius:12px; width:90%; max-width:400px; }
    .safe { background:#22c55e; }
    .emergency { background:#ef4444; }
    .status { margin:20px; font-size:1.2rem; min-height:40px; }
    input { padding:10px; margin:5px; width:70%; }
    .contact-item { background:#334155; padding:10px; margin:8px; border-radius:8px; }
  </style>
</head>
<body>
  <h1>🛡️ OzIntel</h1>
  <p>Personal Safety Alert System</p>

  <button onclick="showPricingPage()" style="background:#64748b; padding:12px 30px; font-size:1rem;">👤 admin@ozintel</button>

  <div style="margin:30px 0;">
    <input type="tel" id="new-phone" placeholder="+61412345678" style="width:60%;">
    <input type="text" id="new-name" placeholder="Name" style="width:30%;">
    <button onclick="addContact()">Add Contact</button>
  </div>

  <div id="contacts-list" style="max-width:400px; margin:0 auto;"></div>

  <button class="safe" onclick="sendAlert('safe')">✅ SAFE ARRIVAL</button>
  <button class="emergency" onclick="sendAlert('emergency')">🚨 SEND HELP</button>

  <p id="status" class="status"></p>

  <script src="script.js"></script>
</body>
</html>
